{% extends "base.html" %}
{% load static %}

{% block content %}
<div class="container py-5">
    <div class="d-flex justify-content-between align-items-center mb-4 flex-wrap gap-3">
        <div class="text-start">
            <h4 class="fw-bold mb-1" style="color:var(--text);">Earnings</h4>
            <p class="text-muted mb-0">Track your revenue and financial performance</p>
        </div>
        <div class="d-flex gap-2">
            <a href="{% url 'profile' %}" class="btn btn-outline-primary" style="border-radius:10px;">
                <i class="fa-solid fa-arrow-left me-1"></i> Back to Profile
            </a>
        </div>
    </div>

    <!-- STATS CARDS -->
    <div class="row g-4 mb-5">
        <div class="col-md-6">
            <div class="stat-card text-center h-100" style="background:var(--neu-bg); box-shadow:var(--neu-raised); border-radius:15px; padding:30px;">
                <div class="stat-icon mx-auto mb-3" style="width:60px; height:60px; border-radius:50%; background:rgba(16,185,129,0.1); display:flex; align-items:center; justify-content:center;">
                    <i class="fa fa-rupee-sign" style="color:#10b981; font-size:24px;"></i>
                </div>
                <div class="stat-value fw-bold" style="font-size:36px; color:#10b981;">₹{{ total_revenue }}</div>
                <div class="stat-label text-muted text-uppercase" style="letter-spacing:1px; font-size:12px;">Lifetime Earnings</div>
            </div>
        </div>

        <div class="col-md-6">
            <div class="stat-card text-center h-100" style="background:var(--neu-bg); box-shadow:var(--neu-raised); border-radius:15px; padding:30px;">
                <div class="stat-icon mx-auto mb-3" style="width:60px; height:60px; border-radius:50%; background:rgba(6,187,204,0.1); display:flex; align-items:center; justify-content:center;">
                    <i class="fa fa-shopping-cart" style="color:var(--primary); font-size:24px;"></i>
                </div>
                <div class="stat-value fw-bold" style="font-size:36px; color:var(--text);">{{ total_orders }}</div>
                <div class="stat-label text-muted text-uppercase" style="letter-spacing:1px; font-size:12px;">Total Sales</div>
            </div>
        </div>
    </div>

    <!-- ANALYTICS CHART -->
    <div class="neu-raised rounded p-4 mb-4" style="background:var(--neu-bg); box-shadow:var(--neu-raised); border-radius:15px;">
        <h5 class="fw-bold mb-4" style="color:var(--text);"><i class="fa-solid fa-chart-line me-2" style="color:var(--primary);"></i>Revenue Overview</h5>
        <div style="height:350px;">
            <canvas id="earningsChart"></canvas>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script>
    document.addEventListener("DOMContentLoaded", function() {
        const ctx = document.getElementById('earningsChart');
        if (ctx) {
            const months = JSON.parse('{{ chart_months|escapejs }}');
            const revenues = JSON.parse('{{ chart_revenues|escapejs }}');

            new Chart(ctx, {
                type: 'line',
                data: {
                    labels: months,
                    datasets: [{
                        label: 'Monthly Revenue (₹)',
                        data: revenues,
                        borderColor: '#06BBCC',
                        backgroundColor: 'rgba(6,187,204,0.1)',
                        borderWidth: 3,
                        pointBackgroundColor: '#06BBCC',
                        pointBorderColor: '#fff',
                        pointHoverBackgroundColor: '#fff',
                        pointHoverBorderColor: '#06BBCC',
                        fill: true,
                        tension: 0.4
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: {
                            display: false
                        }
                    },
                    scales: {
                        y: {
                            beginAtZero: true,
                            grid: {
                                color: 'rgba(0,0,0,0.05)',
                                drawBorder: false
                            }
                        },
                        x: {
                            grid: {
                                display: false
                            }
                        }
                    }
                }
            });
        }
    });
</script>
{% endblock %}
