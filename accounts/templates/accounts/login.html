{% extends "base.html" %}
{% load static %}

{% block content %}

<div class="container-xxl py-5">
    <div class="container">

        <div class="text-center">
            <h6 class="section-title bg-white text-center text-primary px-3">Account</h6>
            <h1 class="mb-5">Login</h1>
        </div>

        <div class="row justify-content-center">
            <div class="col-lg-6">

                <div class="bg-light p-5 rounded shadow">

                    <h4 class="mb-4 text-center">Login</h4>

                    <form>

                        <div class="form-floating mb-3">
                            <input type="email" class="form-control" placeholder="Email">
                            <label>Email Address</label>
                        </div>

                        <div class="form-floating mb-3">
                            <input type="password" class="form-control" pattern="^(?=.*[0-9])(?=.*[!@#$%^&*]).{8,}$"
                                title="Password must contain number and special character" placeholder="Password">
                            <label>Password</label>
                        </div>

                        <div class="d-flex justify-content-between mb-3">

                            <div class="form-check">
                                <input class="form-check-input" type="checkbox">
                                <label class="form-check-label">Remember Me</label>
                            </div>

                            <a href="forgot.html">Forgot Password?</a>

                        </div>

                        <button class="btn btn-primary w-100 py-3">Login</button>

                        <p class="text-center mt-3">
                            Don't have an account?
                            <a href="register.html">Register</a>
                        </p>

                    </form>

                </div>
            </div>
        </div>

    </div>
</div>

{% endblock content %}
