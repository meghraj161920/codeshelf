{% extends "base.html" %}
{% load static %}

{% block content %}

<div class="container mt-5">
    <div class="d-flex justify-content-center align-items-center" style="min-height: 80vh;">

        <div class="card text-center shadow-lg border-0 p-5"
            style="max-width: 500px; width: 100%; border-radius: 20px;">

            <!-- Icon -->
            <div class="mb-3">
                <i class="fas fa-ban display-4 text-warning"></i>
            </div>

            <!-- 403 Code -->
            <h1 class="display-1 fw-bold text-warning">403</h1>

            <!-- Message -->
            <h4 class="fw-semibold">Access Forbidden</h4>
            <p class="text-muted">
                You don’t have permission to access this page.
            </p>

            <!-- Buttons -->
            <div class="mt-4">
                <a href="{% url 'home' %}" class="btn btn-primary rounded-pill px-4 me-2">
                    <i class="fas fa-home"></i> Home
                </a>

                <a href="{% url 'login' %}" class="btn btn-outline-secondary rounded-pill px-4">
                    <i class="fas fa-sign-in-alt"></i> Login
                </a>
            </div>

            <!-- Badge -->
            <div class="mt-3">
                <span class="badge bg-secondary">CodeShelf Error • 403</span>
            </div>

        </div>

    </div>
</div>

{% endblock %}
