{% extends "base.html" %}
{% load static %}

{% block content %}

<div class="container mt-5 text-center">

    <div class="card shadow p-5">

        <h1 class="text-success">🎉 Order Successful!</h1>

        <p class="mt-3">
            Thank you for your purchase.
            Your projects are now available for download.
        </p>

        <p>
            <strong>Order ID:</strong> {{ order_id }}
        </p>

        <a href="{% url 'order_history' %}" class="btn btn-primary mt-3">
            📦 View My Orders
        </a>

        <a href="{% url 'project_list' %}" class="btn btn-outline-secondary mt-2">
            🛍 Continue Shopping
        </a>

    </div>

</div>

{% endblock %}
