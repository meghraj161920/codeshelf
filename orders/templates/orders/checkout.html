{% extends "base.html" %}
{% load static %}

{% block content %}

<div class="container mt-5">

    <h2>🛒 Checkout</h2>

    <div class="row">

        <!-- Order Summary -->
        <div class="col-md-8">

            <div class="card shadow-sm p-4">
                <h4>Order Summary</h4>
                <hr>

                <div class="d-flex justify-content-between">
                    <span>E-commerce Website Project</span>
                    <span>₹499</span>
                </div>

                <div class="d-flex justify-content-between">
                    <span>Chat Application Project</span>
                    <span>₹299</span>
                </div>

                <hr>

                <div class="d-flex justify-content-between">
                    <strong>Subtotal:</strong>
                    <strong>₹798</strong>
                </div>

                <div class="d-flex justify-content-between text-success">
                    <strong>Discount:</strong>
                    <strong>- ₹100</strong>
                </div>

                <hr>

                <div class="d-flex justify-content-between">
                    <h5>Total:</h5>
                    <h5>₹698</h5>
                </div>
            </div>

        </div>

        <!-- Coupon + Place Order -->
        <div class="col-md-4">

            <!-- Coupon Form -->
            <div class="card shadow-sm p-4 mb-3">
                <h5>Apply Coupon</h5>

                <input type="text" class="form-control mb-2" placeholder="Enter coupon code">

                <button class="btn btn-outline-primary w-100">
                    Apply
                </button>

                <p class="text-success mt-2">
                    Coupon REVIEW10 applied!
                </p>
            </div>

            <!-- Place Order -->

            <button class="btn btn-success w-100 btn-lg">
                ✅ Place Order
            </button>

        </div>

    </div>

</div>

{% endblock %}
